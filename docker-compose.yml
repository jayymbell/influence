version: "3"
services:
  db:
    image: postgres
    volumes:
      - db_data:/var/lib/postgresql
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-influence}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
  backend:
    build: ./backend/
    command: bash -c "rm -f tmp/pids/server.pid && bundle exec rails s -p 3000 -b '0.0.0.0'"
    volumes:
      - ./backend/:/backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_HOST: db
      DATABASE_USERNAME: ${POSTGRES_USER:-influence}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      DATABASE_NAME: ${POSTGRES_DB:-influence_development}
      DATABASE_NAME_TEST: ${POSTGRES_DB_TEST:-influence_test}
      FRONTEND_URL: http://localhost:5173
      AI_SERVICE_URL: http://ai:8000
    depends_on:
      - db
  ai:
    build: ./ai/
    volumes:
      - ./ai/:/ai
    ports:
      - "8000:8000"
    env_file:
      - ./ai/.env
    environment:
      BACKEND_URL: http://backend:3000
    depends_on:
      - backend
  frontend:
    build: ./frontend/
    volumes:
      - ./frontend/:/frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:3000


volumes:
  db_data:
