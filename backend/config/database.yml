default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV['DATABASE_HOST'] %>
  username: <%= ENV['DATABASE_USERNAME'] %>
  password: <%= ENV['DATABASE_PASSWORD'] %>

development:
  <<: *default
  database: <%= ENV['DATABASE_NAME'] || 'influence_development' %>
test:
  <<: *default
  database: <%= ENV['DATABASE_NAME_TEST'] || 'influence_test' %>
production:
  <<: *default
  database: <%= ENV['DATABASE_NAME'] %>