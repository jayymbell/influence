version: 2
updates:
  # Backend Ruby dependencies
  - package-ecosystem: "bundler"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      rails:
        patterns:
          - "rails*"
          - "actionpack"
          - "activerecord"
      development:
        dependency-type: "development"
  
  # Frontend npm dependencies
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      vue:
        patterns:
          - "vue*"
          - "@vue/*"
          - "vite*"
      vuetify:
        patterns:
          - "vuetify*"
      development:
        dependency-type: "development"
  
  # Docker base images
  - package-ecosystem: "docker"
    directory: "/backend"
    schedule:
      interval: "weekly"
  
  - package-ecosystem: "docker"
    directory: "/frontend"
    schedule:
      interval: "weekly"
  
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
