name: CI Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-tests:
    name: Backend Tests (Rails)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build images
        run: docker compose build backend
      
      - name: Run RSpec tests with coverage
        run: docker compose run --rm backend bundle exec rspec
      
      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 30
  
  frontend-tests:
    name: Frontend Tests (Jest + Playwright)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build images
        run: docker compose build frontend
      
      - name: Run Jest unit tests
        run: docker compose run --rm frontend yarn test:coverage
      
      - name: Run Playwright E2E tests
        run: docker compose run --rm frontend yarn e2e:coverage-dev
      
      - name: Merge coverage reports
        run: docker compose run --rm frontend yarn coverage:merge
      
      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 30
      
      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: frontend/test-results/
          retention-days: 7

  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Build images
        run: docker compose build backend frontend
      
      - name: Run RuboCop (backend)
        run: docker compose run --rm backend bundle exec rubocop || true
      
      - name: Check for vulnerabilities (frontend)
        run: docker compose run --rm frontend yarn audit --level moderate || true

  status-check:
    name: All Tests Passed
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    if: always()
    
    steps:
      - name: Check status
        run: |
          if [ "${{ needs.backend-tests.result }}" != "success" ] || [ "${{ needs.frontend-tests.result }}" != "success" ]; then
            echo "Tests failed!"
            exit 1
          fi
          echo "All tests passed!"
